[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
markers =
    unit: pure unit tests with no external dependencies
    integration: tests that mock multiple layers together
    slow: tests that take more than 1 second
