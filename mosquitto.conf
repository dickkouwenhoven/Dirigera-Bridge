# mosquitto.conf
#
# Development configuration for HA-MQTT-SDK.
#
# ┌─────────────────────────────────────────────────────────────┐
# │  WARNING: This configuration is for development only.       │
# │  Do NOT use in production — anonymous access is enabled.    │
# │  For production: disable anonymous, configure TLS and ACLs. │
# └─────────────────────────────────────────────────────────────┘

# ── Listener ──────────────────────────────────────────────────────────────────

listener 1883

# Allow connections without username/password (development only)
allow_anonymous true

# ── Persistence ───────────────────────────────────────────────────────────────

# Disabled for development — retained messages (MQTT Discovery payloads)
# are lost on broker restart. The SDK will re-publish them on reconnect.
# Set to true in production to survive restarts.
persistence false

# ── Logging ───────────────────────────────────────────────────────────────────

# Log to stdout so docker compose logs shows broker activity
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Connection limits ─────────────────────────────────────────────────────────

# Maximum simultaneous client connections (0 = unlimited)
max_connections 100
